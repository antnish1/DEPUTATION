<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Service Management System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Service System
</div>

<div class="nav">

<a href="#" onclick="loadPage('dashboard-content.html','Dashboard')">
<i class="fa fa-home"></i>Dashboard
</a>

<a href="#" onclick="loadPage('deputation.html','Engineer Deputation')">
<i class="fa fa-clipboard-list"></i>Deputation
</a>

<a href="#"><i class="fa fa-user-cog"></i>Engineers</a>
<a href="#"><i class="fa fa-tractor"></i>Machines</a>
<a href="#"><i class="fa fa-users"></i>Customers</a>
<a href="#"><i class="fa fa-chart-bar"></i>Reports</a>
<a href="#"><i class="fa fa-gear"></i>Settings</a>

</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<div class="topbar">
<h1 id="pageTitle">Dashboard</h1>
<div><i class="fa fa-bell"></i></div>
</div>

<div id="contentArea"></div>

</div>

</div>

<script src="script.js"></script>

<script>

function loadPage(page,title){

const container = document.getElementById("contentArea");

fetch(page)
.then(res => res.text())
.then(html=>{
container.innerHTML = html;
});

document.getElementById("pageTitle").innerText = title;

}

window.onload=function(){
loadPage("dashboard-content.html","Dashboard");
}

</script>

</body>
</html>
