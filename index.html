<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Service Management System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-header">

<div class="logo">
FCV DEPUTATION
</div>

<i class="fa fa-bars sidebar-toggle" onclick="toggleSidebar()"></i>

</div>

<div class="nav">

<a href="#" onclick="loadPage('dashboard-content.html','Dashboard',this)">
<i class="fa fa-home"></i>
<span>Dashboard</span>
</a>

<a href="#" onclick="loadPage('deputation.html','Engineer Deputation',this)">
<i class="fa fa-clipboard-list"></i>
<span>Deputation</span>
</a>

<a href="#">
<i class="fa fa-user-cog"></i>
<span>Engineers</span>
</a>

<a href="#">
<i class="fa fa-tractor"></i>
<span>Machines</span>
</a>

<a href="#">
<i class="fa fa-users"></i>
<span>Customers</span>
</a>

<a href="#">
<i class="fa fa-chart-bar"></i>
<span>Reports</span>
</a>

<a href="#">
<i class="fa fa-gear"></i>
<span>Settings</span>
</a>

</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">



</div>

<div id="contentArea"></div>

</div>

<script src="script.js"></script>

<script>

function loadPage(page,title,element){

const container = document.getElementById("contentArea");
const controls = document.getElementById("moduleControls");

fetch(page)
.then(res => res.text())
.then(html=>{
container.innerHTML = html;
});

/* update page title */
document.getElementById("pageTitle").innerText = title;

/* sidebar active state */

document.querySelectorAll(".nav a").forEach(link=>{
link.classList.remove("active");
});

if(element){
element.classList.add("active");
}

/* reset header controls */
controls.innerHTML="";

/* add controls for deputation module */

if(page === "deputation.html"){

controls.innerHTML = `

<select id="branchSelector" onchange="loadBranch(this.value)">

<option value="">Select Branch</option>
<option value="DAMOH">DAMOH</option>
<option value="DINDORI">DINDORI</option>
<option value="SEONI">SEONI</option>
<option value="ANUPPUR">ANUPPUR</option>
<option value="BALAGHAT">BALAGHAT</option>
<option value="KATNI">KATNI</option>
<option value="JABALPUR BHL">JABALPUR BHL</option>
<option value="MANDLA">MANDLA</option>
<option value="NARSINGHPUR">NARSINGHPUR</option>
<option value="JABALPUR HL">JABALPUR HL</option>

</select>

<button onclick="addAdditionalRow()">
+ Add Call
</button>

`;

}

}

window.onload=function(){
loadPage("dashboard-content.html","Dashboard",document.querySelector(".nav a"));
}

function toggleSidebar(){

document.querySelector(".sidebar").classList.toggle("collapsed");

document.querySelector(".layout").classList.toggle("collapsed");

}
  
</script>

</body>
</html>
