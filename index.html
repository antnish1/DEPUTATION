<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Service Management System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Service System
</div>

<div class="nav">

<a href="#" onclick="loadPage('dashboard-content.html','Dashboard',this)">
<i class="fa fa-home"></i>
<span>Dashboard</span>
</a>

<a href="#" onclick="loadPage('deputation.html','Engineer Deputation',this)">
<i class="fa fa-clipboard-list"></i>
<span>Deputation</span>
</a>

<a href="#">
<i class="fa fa-user-cog"></i>
<span>Engineers</span>
</a>

<a href="#">
<i class="fa fa-tractor"></i>
<span>Machines</span>
</a>

<a href="#">
<i class="fa fa-users"></i>
<span>Customers</span>
</a>

<a href="#">
<i class="fa fa-chart-bar"></i>
<span>Reports</span>
</a>

<a href="#">
<i class="fa fa-gear"></i>
<span>Settings</span>
</a>

</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<div class="topbar">

<div style="display:flex;align-items:center;gap:10px;">
<i class="fa fa-bars" style="cursor:pointer;" onclick="toggleSidebar()"></i>
<h1 id="pageTitle">Dashboard</h1>
</div>

<div>
<i class="fa fa-bell"></i>
</div>

</div>

<div id="contentArea"></div>

</div>

<script src="script.js"></script>

<script>

function loadPage(page,title,element){

const container = document.getElementById("contentArea");

fetch(page)
.then(res => res.text())
.then(html=>{
container.innerHTML = html;
});

document.getElementById("pageTitle").innerText = title;

/* remove old active */
document.querySelectorAll(".nav a").forEach(link=>{
link.classList.remove("active");
});

/* set new active */
if(element){
element.classList.add("active");
}

}

window.onload=function(){
loadPage("dashboard-content.html","Dashboard",document.querySelector(".nav a"));
}


function toggleSidebar(){

document.querySelector(".sidebar").classList.toggle("collapsed");

document.querySelector(".layout").classList.toggle("collapsed");

}
  
</script>

</body>
</html>
