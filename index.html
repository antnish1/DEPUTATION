<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Service Management Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',system-ui;
background:#f1f5f9;
font-size:14px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;
width:220px;
height:100vh;
background:#0f172a;
color:white;
padding:18px 14px;
box-shadow:2px 0 20px rgba(0,0,0,.15);
}

.sidebar h2{
font-size:16px;
margin-bottom:20px;
font-weight:600;
}

.sidebar a{
display:block;
padding:10px 12px;
font-size:13px;
border-radius:6px;
margin-bottom:6px;
color:#cbd5e1;
text-decoration:none;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
color:white;
}

/* MAIN AREA */

.main{
margin-left:230px;
padding:25px 30px;
min-height:100vh;
box-sizing:border-box;
}

/* TOP BAR */

.topbar{
background:white;
padding:15px 20px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 25px rgba(0,0,0,.08);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
font-size:22px;
margin:0;
color:#2563eb;
}

.card p{
font-size:13px;
color:#64748b;
margin-top:4px;
}

/* QUICK ACTIONS */

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.action-btn{
background:white;
padding:18px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 4px 20px rgba(0,0,0,.08);
transition:.2s;
font-size:13px;
}

.action-btn i{
margin-bottom:6px;
color:#2563eb;
}

.action-btn:hover{
transform:translateY(-2px);
background:#eff6ff;
}

/* BRANCH GRID */

.branch-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.branch{
background:white;
padding:18px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 25px rgba(0,0,0,.08);
transition:.2s;
}

.branch:hover{
background:#eff6ff;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Service System</h2>

<a href="#">Dashboard</a>
<a href="#">Deputation</a>
<a href="#">Engineers</a>
<a href="#">Machines</a>
<a href="#">Customers</a>
<a href="#">Reports</a>
<a href="#">Settings</a>

</div>

<div class="main">

<div class="topbar">
<h3>Dashboard</h3>
<div>
<i class="fa fa-bell"></i>
</div>
</div>

<div class="stats">

<div class="card">
<h3>14</h3>
<p>Engineers Onsite</p>
</div>

<div class="card">
<h3>6</h3>
<p>Workshop Engineers</p>
</div>

<div class="card">
<h3>22</h3>
<p>Active Calls</p>
</div>

<div class="card">
<h3>5</h3>
<p>Branches Active</p>
</div>

</div>

<div class="actions">

<div class="action-btn" onclick="openDeputation()">
<i class="fa fa-clipboard-list fa-2x"></i>
<p>Open Deputation</p>
</div>

<div class="action-btn">
<i class="fa fa-user-cog fa-2x"></i>
<p>Manage Engineers</p>
</div>

<div class="action-btn">
<i class="fa fa-tractor fa-2x"></i>
<p>Machine Database</p>
</div>

<div class="action-btn">
<i class="fa fa-chart-bar fa-2x"></i>
<p>Reports</p>
</div>

</div>

<h3>Branches</h3>

<div class="branch-grid">

<div class="branch">DAMOH</div>
<div class="branch">SEONI</div>
<div class="branch">MANDLA</div>
<div class="branch">KATNI</div>
<div class="branch">BALAGHAT</div>
<div class="branch">ANUPPUR</div>

</div>

</div>

<script>

function openDeputation(){
window.location.href='?page=deputation';
}

</script>
  
</body>
</html>
