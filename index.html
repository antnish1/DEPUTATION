<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Service Management System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:'Inter',system-ui;
background:#f1f5f9;
color:#1e293b;
font-size:14px;
}

/* LAYOUT */

.layout{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
padding:20px 16px;
flex-shrink:0;
}

.logo{
font-size:16px;
font-weight:600;
margin-bottom:25px;
}

.nav a{
display:flex;
align-items:center;
gap:10px;
padding:10px 12px;
border-radius:6px;
text-decoration:none;
color:#cbd5e1;
font-size:13px;
margin-bottom:6px;
transition:0.2s;
}

.nav a:hover{
background:#1e293b;
color:white;
}

/* MAIN AREA */

.main{
flex:1;
padding:25px 30px;
}

/* TOPBAR */

.topbar{
background:white;
padding:14px 20px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 20px rgba(0,0,0,.05);
margin-bottom:25px;
}

.topbar h1{
font-size:16px;
margin:0;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Service System
</div>

<div class="nav">

<a href="#" onclick="loadPage('dashboard-content.html','Dashboard')">
<i class="fa fa-home"></i>Dashboard
</a>

<a href="#" onclick="loadPage('deputation.html','Engineer Deputation')">
<i class="fa fa-clipboard-list"></i>Deputation
</a>

<a href="#"><i class="fa fa-user-cog"></i>Engineers</a>
<a href="#"><i class="fa fa-tractor"></i>Machines</a>
<a href="#"><i class="fa fa-users"></i>Customers</a>
<a href="#"><i class="fa fa-chart-bar"></i>Reports</a>
<a href="#"><i class="fa fa-gear"></i>Settings</a>

</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<div class="topbar">
<h1 id="pageTitle">Dashboard</h1>
<div><i class="fa fa-bell"></i></div>
</div>

<div id="contentArea"></div>

</div>

</div>

  
<script src="script.js"></script>
<script>

function loadPage(page,title){

const container = document.getElementById("contentArea");

fetch(page)
.then(res => res.text())
.then(html=>{
container.innerHTML = html;
});

document.getElementById("pageTitle").innerText = title;

}

window.onload=function(){
loadPage("dashboard-content.html","Dashboard");
}

</script>

</body>
</html>
