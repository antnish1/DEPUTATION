<div class="module-header">

<h2>Engineer Deputation</h2>

<div class="module-actions">

<select id="branchSelector" onchange="loadBranch(this.value)">

<option value="">Select Branch</option>
<option value="DAMOH">DAMOH</option>
<option value="DINDORI">DINDORI</option>
<option value="SEONI">SEONI</option>
<option value="ANUPPUR">ANUPPUR</option>
<option value="BALAGHAT">BALAGHAT</option>
<option value="KATNI">KATNI</option>
<option value="JABALPUR BHL">JABALPUR BHL</option>
<option value="MANDLA">MANDLA</option>
<option value="NARSINGHPUR">NARSINGHPUR</option>
<option value="JABALPUR HL">JABALPUR HL</option>

</select>

<button class="save-btn" onclick="addAdditionalRow()">
+ Add Call
</button>

</div>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div class="main-content">

<div id="branchContent" style="display:none;">

<div class="branch-toolbar">
<div class="branch-info">
<span id="branchHiddenTitle" style="display:none;"></span>
</div>
</div>

<div class="module-card">

<div class="table-wrapper">

<table id="deputationTable">

<thead>
<tr>
<th>Engineer</th>
<th>W/O</th>
<th>Machine No *</th>
<th>Customer</th>
<th>Contact No</th>
<th>Complaint *</th>
<th>HMR</th>
<th>Call Type</th>
<th>P/S</th>
<th>Status</th>
<th>M/C Location</th>
<th>KM</th>
<th>Call ID</th>
<th>Labour</th>
<th>TA DA</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<div style="margin-top:10px;">
<button id="addRowBtn" class="save-btn" onclick="addAdditionalRow()">
+ Add Additional Call
</button>
</div>

<button id="printReportBtn"
class="floating-print-btn"
onclick="finalizeAndPrint()">
Finalize & Print
</button>

<button id="saveAllBtn"
class="floating-save-btn"
onclick="saveAll()">
Save Changes
</button>

</div>

</div>

<!-- POPUP -->

<div id="popup" class="popup hidden">
<div class="popup-box">
<p id="popupText"></p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<div id="unsavedPopup" class="industry-popup hidden">
<div class="industry-box">
<h3>Unsaved Changes Detected</h3>
<p>Please save your changes before switching branches.</p>

<div class="industry-actions">
<button onclick="closeUnsavedPopup()">Continue Editing</button>
<button onclick="forceSave()">Save Now</button>
</div>

</div>
</div>

<!-- GLOBAL LOADER -->

<div id="globalLoader" class="loader-overlay hidden">

<div class="loader-box">

<div class="spinner"></div>
<p id="loaderText">Loading...</p>

</div>

</div>
